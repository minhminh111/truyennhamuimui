<!-- DATA -->
<script src="data.js"></script>

<script>
const list = document.getElementById("list");

function render(data){

  list.innerHTML = "";

  // lọc cổ trang
  const cotrang = data.filter(item => item.type === "cotrang");

  // mới lên đầu
  cotrang.slice().reverse().forEach(item => {
    list.innerHTML += `
      <a class="book" href="${item.link}">
        <img src="${item.image}" alt="${item.title}">
        <h2>${item.title}</h2>
      </a>
    `;
  });
}
