<!-- DATA -->
<script src="data.js"></script>

<script>

const list = document.getElementById("list");

function render(data){

  list.innerHTML = "";

  // lọc truyện đam mỹ
  const dammy =
    data.filter(item => item.type === "dammy");

  // truyện mới lên đầu
  dammy
    .slice()
    .reverse()
    .forEach(item => {

      list.innerHTML += `

        <a class="book"
           href="detail.html?id=${item.id}">

          <img src="${item.image}"
               alt="${item.title}">

          <h2>${item.title}</h2>

        </a>

      `;

    });
