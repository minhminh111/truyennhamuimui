<div class="container" id="list"></div>

<script src="data.js"></script>

<script>

const list = document.getElementById("list");

function render(data){

  list.innerHTML = "";

  const ngontinh =
    data.filter(item => item.type === "ngontinh");

  ngontinh
    .slice()
    .reverse()
    .forEach(item => {

      list.innerHTML += `

        <a class="book"
           href="detail.html?id=${item.id}">

          <img src="${item.image}" alt="">

          <h2>${item.title}</h2>

        </a>

      `;

    });

}
